spring:
  datasource:
    url: jdbc:mysql://localhost:3306/batch_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: batch_user
    password: batch1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  batch:
    jdbc:
      initialize-schema: always  # 메타테이블 자동 생성
    job:
      enabled: false  # 앱 기동 시 자동 실행 방지

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true